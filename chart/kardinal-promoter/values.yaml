# Default values for kardinal-promoter.
# This is a YAML-formatted file.

# -- Number of controller replicas
replicaCount: 1

image:
  # -- Container image repository
  repository: ghcr.io/pnz1990/kardinal-promoter/controller
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (defaults to chart appVersion)
  tag: "latest"

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the name of the chart
nameOverride: ""
# -- Override the full name of the chart
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- Annotations to add to the ServiceAccount
  annotations: {}
  # -- Override the ServiceAccount name
  name: ""

# -- Annotations to add to the controller Pod
podAnnotations: {}

# -- Security context for the controller Pod
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# -- Security context for the controller container
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# -- Controller log level (debug, info, warn, error)
logLevel: info

# -- Enable leader election for controller manager
leaderElect: true

# -- Address the metrics endpoint binds to
metricsBindAddress: ":8080"

# -- Address the health probe endpoint binds to
healthProbeBindAddress: ":8081"

service:
  # -- Metrics port (Prometheus)
  metricsPort: 8080
  # -- Health/readiness probe port
  healthPort: 8081

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

# -- Node selector for the controller Pod
nodeSelector: {}

# -- Tolerations for the controller Pod
tolerations: []

# -- Affinity rules for the controller Pod
affinity: {}

# -- GitHub token for SCM operations (opening PRs, detecting merges).
# Provide either a direct value (not recommended for production) or a secretRef.
# The secretRef.key defaults to "token".
# Example:
#   github:
#     token: "ghp_..."
#   OR
#   github:
#     secretRef:
#       name: github-token
#       namespace: ""  # defaults to Release.Namespace
#       key: token
github:
  # -- Direct token value (use secretRef in production)
  token: ""
  # -- Reference to an existing Secret containing the GitHub token
  secretRef:
    name: ""
    namespace: ""
    key: "token"

# -- krocodile Graph controller dependency.
# kardinal-promoter requires the krocodile Graph controller to be installed
# in the cluster. This section documents the required version for reference —
# installation is handled separately via hack/install-krocodile.sh or make install-krocodile.
krocodile:
  # Pinned commit from github.com/ellistarn/kro (krocodile branch).
  # Update this when intentionally upgrading krocodile.
  # See hack/install-krocodile.sh for the actual install logic.
  # Minimum required: 1b0ce353 (fixes double-dispatch race in DAG coordinator)
  pinnedCommit: "9c18aa34"
  # API group for Graph CRDs (as of commit 48224264, 2026-04-10)
  apiGroup: "experimental.kro.run"
  # Namespace where the Graph controller runs
  namespace: "kro-system"

# -- ValidatingAdmissionPolicy for PolicyGate CEL expression validation.
# Requires Kubernetes 1.28+. When enabled, prevents PolicyGates with empty
# spec.expression from being created or updated (issue #317).
# Full CEL syntax validation requires a validating webhook.
validatingAdmissionPolicy:
  enabled: true
