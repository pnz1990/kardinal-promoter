# Default values for kardinal-promoter.
# This is a YAML-formatted file.

# -- Number of controller replicas
replicaCount: 1

# -- Pod termination grace period in seconds.
# Must be at least 2× the controller's GracefulShutdownTimeout (30s) to allow
# in-flight reconcile loops to complete before SIGKILL. (#574)
terminationGracePeriodSeconds: 60

image:
  # -- Container image repository
  repository: ghcr.io/pnz1990/kardinal-promoter/controller
  # -- Image pull policy
  pullPolicy: IfNotPresent
  # -- Image tag (defaults to chart appVersion)
  tag: ""

# -- Image pull secrets for private registries
imagePullSecrets: []

# -- Override the name of the chart
nameOverride: ""
# -- Override the full name of the chart
fullnameOverride: ""

serviceAccount:
  # -- Create a ServiceAccount
  create: true
  # -- Annotations to add to the ServiceAccount
  annotations: {}
  # -- Override the ServiceAccount name
  name: ""

# -- Annotations to add to the controller Pod
podAnnotations: {}

# -- Security context for the controller Pod
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

# -- Security context for the controller container
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# -- Controller log level (debug, info, warn, error)
logLevel: info

# -- Enable leader election for controller manager
leaderElect: true

# -- Address the metrics endpoint binds to
metricsBindAddress: ":8080"

# -- Address the health probe endpoint binds to
healthProbeBindAddress: ":8081"

service:
  # -- Metrics port (Prometheus)
  metricsPort: 8080
  # -- Health/readiness probe port
  healthPort: 8081

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

# -- Node selector for the controller Pod
nodeSelector: {}

# -- Tolerations for the controller Pod
tolerations: []

# -- Affinity rules for the controller Pod
affinity: {}

# -- GitHub token for SCM operations (opening PRs, detecting merges).
# Provide either a direct value (not recommended for production) or a secretRef.
# The secretRef.key defaults to "token".
# Example:
#   github:
#     token: "ghp_..."
#   OR
#   github:
#     secretRef:
#       name: github-token
#       namespace: ""  # defaults to Release.Namespace
#       key: token
github:
  # -- Direct token value (use secretRef in production)
  token: ""
  # -- Reference to an existing Secret containing the GitHub token
  secretRef:
    name: ""
    namespace: ""
    key: "token"

# -- krocodile Graph controller.
# kardinal-promoter builds and vendors the krocodile Graph controller as part
# of its own release. A single `helm install` installs both controllers —
# no separate install script required.
#
# The krocodile image is built from a pinned commit of github.com/ellistarn/kro
# (krocodile branch) and published to ghcr.io/pnz1990/kardinal-promoter/krocodile
# at release time. The image is co-versioned with each kardinal-promoter release.
#
# Set enabled: false if you already run krocodile independently in your cluster.
krocodile:
  # -- Install krocodile Graph controller alongside kardinal-promoter.
  # Set to false if krocodile is already installed in the cluster.
  enabled: true

  # -- Number of krocodile controller replicas.
  replicaCount: 1

  # Pinned source commit from github.com/ellistarn/kro (krocodile branch).
  # This is the commit the release pipeline built the image from.
  # Used as the default image tag when image.tag is not set.
  # Update via the krocodile upgrade protocol in AGENTS.md.
  pinnedCommit: "745998f"

  # -- API group for Graph CRDs.
  apiGroup: "experimental.kro.run"

  # -- Namespace where the krocodile Graph controller runs.
  namespace: "kro-system"

  image:
    # -- krocodile controller image repository.
    # Built and published by the kardinal-promoter release pipeline.
    repository: ghcr.io/pnz1990/kardinal-promoter/krocodile
    # -- Image tag. Defaults to krocodile.pinnedCommit when empty.
    tag: ""
    # -- Image pull policy.
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi

  # -- Node selector for the krocodile Pod.
  nodeSelector: {}

  # -- Tolerations for the krocodile Pod.
  tolerations: []

# -- ValidatingAdmissionPolicy for PolicyGate validation.
# Requires Kubernetes 1.28+. When enabled, validates PolicyGate spec.expression
# (non-empty) and spec.recheckInterval (Go duration format) at admission time.
# Disable for kind/k8s < 1.28 or when using --validate=false.
validatingAdmissionPolicy:
  enabled: true

# -- NetworkPolicy for the controller namespace.
# When enabled, restricts controller ingress (Kubernetes API server only)
# and egress (Kubernetes API server + HTTPS for SCM providers + DNS).
# Disable if your CNI does not support NetworkPolicy.
networkPolicy:
  enabled: false

# -- ScheduleClock configuration.
# One ScheduleClock is deployed per cluster to generate watch events for
# PolicyGates with schedule.* expressions. This eliminates the per-gate
# RequeueAfter timer loop.
scheduleClock:
  enabled: true
  interval: "1m"

# -- PodDisruptionBudget for the controller.
# Only created when replicaCount > 1 to ensure at least one replica is
# available during node maintenance or rolling updates.
pdb:
  enabled: true
  # -- Minimum number of pods that must be available during disruption.
  minAvailable: 1

# -- Topology spread constraints for multi-replica deployments.
# When enabled and replicaCount > 1, spreads replicas across availability
# zones to prevent both replicas from landing on the same node.
topologySpread:
  enabled: true
