{{- if .Values.controller.watchNamespace -}}
# RoleBinding for namespace-scoped install mode.
# Rendered only when controller.watchNamespace is non-empty.
# Design ref: docs/design/15-production-readiness.md §Lens 6
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "kardinal-promoter.fullname" . }}-manager-rolebinding
  namespace: {{ .Values.controller.watchNamespace }}
  labels:
    {{- include "kardinal-promoter.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "kardinal-promoter.fullname" . }}-manager-role
subjects:
  - kind: ServiceAccount
    name: {{ include "kardinal-promoter.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
