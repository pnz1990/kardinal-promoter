{{- if .Values.controller.watchNamespace -}}
# Role for namespace-scoped install mode.
# Rendered only when controller.watchNamespace is non-empty.
# Grants the same permissions as the ClusterRole but scoped to the watch namespace.
# When this Role is rendered, the ClusterRole/ClusterRoleBinding are NOT rendered.
# Design ref: docs/design/15-production-readiness.md §Lens 6
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "kardinal-promoter.fullname" . }}-manager-role
  namespace: {{ .Values.controller.watchNamespace }}
  labels:
    {{- include "kardinal-promoter.labels" . | nindent 4 }}
rules:
  # Core Kubernetes resources the controller reads/writes
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Coordination for leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # kardinal.io CRDs — user-created resources (read/write)
  - apiGroups: ["kardinal.io"]
    resources:
      - pipelines
      - bundles
      - policygates
      - changewindows
      - rollbackpolicies
      - subscriptions
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # kardinal.io CRDs — status subresources (write-back from reconcilers)
  - apiGroups: ["kardinal.io"]
    resources:
      - pipelines/status
      - bundles/status
      - policygates/status
      - changewindows/status
      - rollbackpolicies/status
      - subscriptions/status
    verbs: ["get", "update", "patch"]
  # kardinal.io CRDs — controller-internal resources (owned by controller)
  - apiGroups: ["kardinal.io"]
    resources:
      - promotionsteps
      - prstatuses
      - metricchecks
      - scheduleclocks
      - notificationhooks
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kardinal.io"]
    resources:
      - promotionsteps/status
      - prstatuses/status
      - metricchecks/status
      - scheduleclocks/status
      - notificationhooks/status
    verbs: ["get", "update", "patch"]
  # kardinal.io CRDs — immutable audit records (write-only by controller)
  - apiGroups: ["kardinal.io"]
    resources:
      - auditevents
    verbs: ["get", "list", "watch", "create"]
  # kro Graph CRDs (generated promotion DAGs) — experimental.kro.run API group
  - apiGroups: ["experimental.kro.run"]
    resources: ["graphs", "graphs/status", "graphrevisions", "graphrevisions/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Deployments — required by the Deployment health adapter to check rollout status.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  # ArgoCDApplications — required by the ArgoCD health adapter (optional).
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
  # Flux Kustomizations — required by the Flux health adapter (optional).
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "watch"]
{{- end }}
