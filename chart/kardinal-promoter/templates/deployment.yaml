apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "kardinal-promoter.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kardinal-promoter.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "kardinal-promoter.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "kardinal-promoter.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "kardinal-promoter.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 60 }}
      containers:
        - name: controller
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --leader-elect={{ .Values.leaderElect }}
            - --zap-log-level={{ .Values.logLevel }}
            - --metrics-bind-address={{ .Values.metricsBindAddress }}
            - --health-probe-bind-address={{ .Values.healthProbeBindAddress }}
          env:
            {{- if .Values.github.token }}
            - name: GITHUB_TOKEN
              value: {{ .Values.github.token | quote }}
            {{- else if .Values.github.secretRef.name }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.github.secretRef.name }}
                  key: {{ .Values.github.secretRef.key | default "token" }}
            {{- end }}
            {{- if .Values.github.secretRef.name }}
            {{- /* Zero-downtime credential rotation: when secretRef is set, also configure
                   the SecretWatcher so the controller reloads on token change. */}}
            - name: KARDINAL_SCM_TOKEN_SECRET_NAME
              value: {{ .Values.github.secretRef.name | quote }}
            - name: KARDINAL_SCM_TOKEN_SECRET_NAMESPACE
              value: {{ .Values.github.secretRef.namespace | default .Release.Namespace | quote }}
            - name: KARDINAL_SCM_TOKEN_SECRET_KEY
              value: {{ .Values.github.secretRef.key | default "token" | quote }}
            {{- end }}
            {{- if .Values.controller.tlsCertFile }}
            - name: KARDINAL_TLS_CERT_FILE
              value: {{ .Values.controller.tlsCertFile | quote }}
            {{- end }}
            {{- if .Values.controller.tlsKeyFile }}
            - name: KARDINAL_TLS_KEY_FILE
              value: {{ .Values.controller.tlsKeyFile | quote }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.service.healthPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.topologySpread.enabled (gt (int .Values.replicaCount) 1) }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "kardinal-promoter.selectorLabels" . | nindent 14 }}
      {{- end }}
