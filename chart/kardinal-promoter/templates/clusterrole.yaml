{{- if not .Values.controller.watchNamespace -}}
# ClusterRole for kardinal-promoter controller.
# Grants the minimum permissions required to reconcile Pipelines, Bundles,
# PolicyGates, PromotionSteps, and all supporting kardinal.io CRD types.
# Audit note: "resources: *" replaced with explicit resource list per
# enterprise least-privilege requirements (issue #516).
# Rendered only when controller.watchNamespace is empty (cluster-wide mode).
# When controller.watchNamespace is set, a Role is rendered instead.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kardinal-promoter.fullname" . }}-manager-role
  labels:
    {{- include "kardinal-promoter.labels" . | nindent 4 }}
rules:
  # Core Kubernetes resources the controller reads/writes
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["configmaps", "namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  # Coordination for leader election
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # kardinal.io CRDs — user-created resources (read/write)
  - apiGroups: ["kardinal.io"]
    resources:
      - pipelines
      - bundles
      - policygates
      - changewindows
      - rollbackpolicies
      - subscriptions
      - promotiontemplates
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # kardinal.io CRDs — status subresources (write-back from reconcilers)
  - apiGroups: ["kardinal.io"]
    resources:
      - pipelines/status
      - bundles/status
      - policygates/status
      - changewindows/status
      - rollbackpolicies/status
      - subscriptions/status
    verbs: ["get", "update", "patch"]
  # kardinal.io CRDs — controller-internal resources (owned by controller)
  - apiGroups: ["kardinal.io"]
    resources:
      - promotionsteps
      - prstatuses
      - metricchecks
      - scheduleclocks
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["kardinal.io"]
    resources:
      - promotionsteps/status
      - prstatuses/status
      - metricchecks/status
      - scheduleclocks/status
    verbs: ["get", "update", "patch"]
  # kro Graph CRDs (generated promotion DAGs) — experimental.kro.run API group
  # as of krocodile commit 48224264 (2026-04-10). Update when krocodile API group changes.
  - apiGroups: ["experimental.kro.run"]
    resources: ["graphs", "graphs/status", "graphrevisions", "graphrevisions/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Deployments — required by the Deployment health adapter to check rollout status.
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  # ArgoCDApplications — required by the ArgoCD health adapter (optional).
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
  # Flux Kustomizations — required by the Flux health adapter (optional).
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources: ["kustomizations"]
    verbs: ["get", "list", "watch"]
{{- end }}
