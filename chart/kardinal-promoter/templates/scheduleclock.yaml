{{- if .Values.scheduleClock.enabled }}
# ScheduleClock — one per cluster. Generates watch events on interval for
# PolicyGates with schedule.* expressions. Eliminates RequeueAfter timer loops.
apiVersion: kardinal.io/v1alpha1
kind: ScheduleClock
metadata:
  name: kardinal-clock
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kardinal-promoter.labels" . | nindent 4 }}
spec:
  interval: {{ .Values.scheduleClock.interval | quote }}
{{- end }}
