---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: (devel)
  name: subscriptions.kardinal.io
spec:
  group: kardinal.io
  names:
    kind: Subscription
    listKind: SubscriptionList
    plural: subscriptions
    shortNames:
    - sub
    singular: subscription
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .spec.pipeline
      name: Pipeline
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.lastBundleCreated
      name: Last-Bundle
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Subscription watches an OCI registry or Git repository for new artifacts and
          automatically creates Bundle CRDs when new tags or commits are detected.

          Architecture: this is an Owned node (Q2 in Graph-first question stack).
          The reconciler polls an external source, writes the result to its own CRD status,
          and creates Bundle objects as child resources. It never mutates other CRDs' status.

          Stage 18 implementation. Removes the CI dependency for artifact discovery.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SubscriptionSpec defines the desired state of a Subscription.
            properties:
              git:
                description: Git holds Git repository watching parameters. Required
                  when type=git.
                properties:
                  branch:
                    default: main
                    description: Branch is the branch to watch. Defaults to "main".
                    type: string
                  interval:
                    default: 5m
                    description: |-
                      Interval is how often to poll the repository.
                      Uses Go duration format (e.g. "5m", "1h").
                    type: string
                  pathGlob:
                    description: |-
                      PathGlob is an optional glob pattern for files to watch.
                      Only commits that touch matching paths trigger Bundle creation.
                      Empty string watches all paths.
                    type: string
                  repoURL:
                    description: RepoURL is the HTTPS Git repository URL.
                    minLength: 1
                    type: string
                required:
                - repoURL
                type: object
              image:
                description: Image holds OCI registry watching parameters. Required
                  when type=image.
                properties:
                  interval:
                    default: 5m
                    description: |-
                      Interval is how often to poll the registry.
                      Uses Go duration format (e.g. "5m", "1h").
                    type: string
                  registry:
                    description: Registry is the OCI registry URL (e.g. "ghcr.io/myorg/myapp").
                    minLength: 1
                    type: string
                  tagFilter:
                    description: |-
                      TagFilter is an optional regular expression that image tags must match.
                      Empty string matches all tags.
                    type: string
                required:
                - registry
                type: object
              namespace:
                description: |-
                  Namespace is the namespace where Bundles will be created.
                  Defaults to the Subscription's own namespace.
                type: string
              pipeline:
                description: Pipeline is the name of the Pipeline CRD that Bundles
                  should target.
                minLength: 1
                type: string
              type:
                allOf:
                - enum:
                  - image
                  - git
                - enum:
                  - image
                  - git
                description: 'Type identifies the artifact source: "image" (OCI) or
                  "git".'
                type: string
            required:
            - pipeline
            - type
            type: object
          status:
            description: SubscriptionStatus defines the observed state of a Subscription.
            properties:
              lastBundleCreated:
                description: LastBundleCreated is the name of the last Bundle created
                  by this Subscription.
                type: string
              lastCheckedAt:
                description: LastCheckedAt is the RFC3339 timestamp of the last poll.
                type: string
              lastSeenDigest:
                description: |-
                  LastSeenDigest is the OCI digest or Git commit SHA from the last successful check.
                  Used for deduplication — a new Bundle is only created when this changes.
                type: string
              message:
                description: Message provides a human-readable reason for the current
                  phase (e.g. error details).
                type: string
              phase:
                description: Phase is the current subscription state.
                enum:
                - Watching
                - Idle
                - Error
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
