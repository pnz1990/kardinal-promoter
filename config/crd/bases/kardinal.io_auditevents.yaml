---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: auditevents.kardinal.io
spec:
  group: kardinal.io
  names:
    kind: AuditEvent
    listKind: AuditEventList
    plural: auditevents
    shortNames:
    - ae
    - audit
    singular: auditevent
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.pipelineName
      name: Pipeline
      type: string
    - jsonPath: .spec.bundleName
      name: Bundle
      type: string
    - jsonPath: .spec.environment
      name: Environment
      type: string
    - jsonPath: .spec.action
      name: Action
      type: string
    - jsonPath: .spec.outcome
      name: Outcome
      type: string
    - jsonPath: .spec.timestamp
      name: Timestamp
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          AuditEvent is an immutable record of a single promotion event.
          It is written once by the PromotionStep reconciler and never updated.
          AuditEvents form an append-only log of all promotion activity across
          all pipelines.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              AuditEventSpec defines the immutable record of a single promotion event.
              AuditEvents are written by the PromotionStep reconciler at key lifecycle
              transitions (started, succeeded, failed). They are append-only — the
              spec is set at creation and never mutated.
            properties:
              action:
                description: |-
                  Action is a short verb describing what happened.
                  Valid values: "PromotionStarted", "PromotionSucceeded", "PromotionFailed",
                                "PromotionSuperseded", "RollbackStarted", "RollbackSucceeded",
                                "HealthCheckFailed", "GateBlocked", "GateEvaluated".
                enum:
                - PromotionStarted
                - PromotionSucceeded
                - PromotionFailed
                - PromotionSuperseded
                - RollbackStarted
                - RollbackSucceeded
                - HealthCheckFailed
                - GateBlocked
                - GateEvaluated
                type: string
              actor:
                description: |-
                  Actor is the identity that triggered the action.
                  For automated promotions this is the controller service account.
                  For human-initiated actions (rollback, override) this is the author from Bundle provenance.
                type: string
              bundleImage:
                description: BundleImage is the container image tag being promoted,
                  if applicable.
                type: string
              bundleName:
                description: BundleName is the name of the Bundle being promoted.
                minLength: 1
                type: string
              environment:
                description: Environment is the environment name where the event occurred.
                minLength: 1
                type: string
              message:
                description: Message is a human-readable description of the event.
                type: string
              outcome:
                description: |-
                  Outcome describes the result of the action.
                  Valid values: "Success", "Failure", "Pending".
                enum:
                - Success
                - Failure
                - Pending
                type: string
              pipelineName:
                description: PipelineName is the name of the Pipeline the Bundle is
                  promoting through.
                minLength: 1
                type: string
              timestamp:
                description: Timestamp is when the event occurred (RFC 3339 format).
                format: date-time
                type: string
            required:
            - action
            - bundleName
            - environment
            - outcome
            - pipelineName
            - timestamp
            type: object
        type: object
    served: true
    storage: true
    subresources: {}
