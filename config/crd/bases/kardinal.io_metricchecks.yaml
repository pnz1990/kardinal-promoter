---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: metricchecks.kardinal.io
spec:
  group: kardinal.io
  names:
    kind: MetricCheck
    listKind: MetricCheckList
    plural: metricchecks
    singular: metriccheck
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.provider
      name: Provider
      type: string
    - jsonPath: .status.result
      name: Result
      type: string
    - jsonPath: .status.lastValue
      name: LastValue
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          MetricCheck is a Prometheus-backed metric gate.
          The MetricCheckReconciler queries Prometheus, evaluates the threshold,
          and writes the result to status. PolicyGate CEL expressions reference
          these results via `metrics.<name>.value` and `metrics.<name>.result`.

          MetricCheck objects are typically created alongside PolicyGates that
          reference them. They are cluster-scoped to the same namespace as the
          PolicyGate that uses them.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              MetricCheckSpec defines a Prometheus-backed metric gate.
              The MetricCheckReconciler queries Prometheus at spec.interval, evaluates
              the threshold, and writes results to status. PolicyGate CEL expressions
              can reference these results via the metrics.* context variable.
            properties:
              interval:
                description: |-
                  Interval is how often to re-evaluate the metric (e.g. "1m", "5m").
                  Defaults to "1m" if empty.
                type: string
              prometheusURL:
                description: |-
                  PrometheusURL is the base URL of the Prometheus server.
                  Example: http://prometheus.monitoring.svc:9090
                minLength: 1
                type: string
              provider:
                default: prometheus
                description: Provider is the metrics backend. Currently only "prometheus"
                  is supported.
                enum:
                - prometheus
                type: string
              query:
                description: |-
                  Query is the PromQL query string to evaluate.
                  The query must return a scalar or a single-element vector.
                minLength: 1
                type: string
              threshold:
                description: Threshold defines how to compare the metric value.
                properties:
                  operator:
                    description: |-
                      Operator is the comparison operator: lt, gt, lte, gte, eq.
                      The gate passes when: metric_value <operator> threshold.value
                      Example: operator=lt, value=0.01 → gate passes if metric < 0.01
                    enum:
                    - lt
                    - gt
                    - lte
                    - gte
                    - eq
                    type: string
                  value:
                    description: Value is the numeric threshold to compare against.
                    type: number
                required:
                - operator
                - value
                type: object
            required:
            - prometheusURL
            - provider
            - query
            - threshold
            type: object
          status:
            description: MetricCheckStatus records the most recent metric evaluation
              result.
            properties:
              lastEvaluatedAt:
                description: LastEvaluatedAt is the timestamp of the most recent evaluation.
                format: date-time
                type: string
              lastValue:
                description: |-
                  LastValue is the most recent metric value returned by the Prometheus query.
                  Empty string means no evaluation has completed yet.
                type: string
              reason:
                description: Reason is a human-readable explanation of the current
                  result.
                type: string
              result:
                description: |-
                  Result is the evaluation result: "Pass" or "Fail".
                  Empty when no evaluation has completed.
                enum:
                - Pass
                - Fail
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
