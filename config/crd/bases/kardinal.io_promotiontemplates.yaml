kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: promotiontemplates.kardinal.io
spec:
  group: kardinal.io
  names:
    kind: PromotionTemplate
    listKind: PromotionTemplateList
    plural: promotiontemplates
    shortNames:
    - pt
    singular: promotiontemplate
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: "PromotionTemplate is a reusable named step sequence that Pipeline
          environments\ncan reference via spec.environments[].promotionTemplate.\nThe
          translator inlines the template's steps at graph-build time, so there is\nno
          runtime dependency on the PromotionTemplate after Graph creation.\n\nExample
          usage:\n\n\tapiVersion: kardinal.io/v1alpha1\n\tkind: PromotionTemplate\n\tmetadata:\n\t
          \ name: standard-with-webhook\n\tspec:\n\t  description: \"Standard promotion
          with post-deploy webhook notification\"\n\t  steps:\n\t    - uses: git-clone\n\t
          \   - uses: kustomize-set-image\n\t    - uses: git-commit\n\t    - uses:
          open-pr\n\t    - uses: wait-for-merge\n\t    - uses: notify-slack\n\t      webhook:\n\t
          \       url: https://hooks.slack.com/...\n\t    - uses: health-check"
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PromotionTemplateSpec defines the desired state of a PromotionTemplate.
            properties:
              description:
                description: Description is a human-readable explanation of what this
                  template represents.
                type: string
              steps:
                description: |-
                  Steps is the named step sequence for this template.
                  Environments that reference this template inherit these steps unless
                  they specify their own steps (local spec.environments[].steps takes precedence).
                  When empty, environments referencing this template use the default step sequence.
                items:
                  description: |-
                    StepSpec declares a custom or built-in step override in a Pipeline environment.
                    When Uses matches a built-in step name the built-in takes precedence.
                    When Uses is an unknown name the Webhook config is required.
                  properties:
                    uses:
                      description: Uses identifies the step to execute (built-in name
                        or custom name).
                      minLength: 1
                      type: string
                    webhook:
                      description: |-
                        Webhook configures the HTTP endpoint for custom (non-built-in) steps.
                        Required when Uses does not match any registered built-in step.
                      properties:
                        secretRef:
                          description: |-
                            SecretRef references a Kubernetes Secret whose "Authorization" key is
                            sent as the Authorization header.
                          properties:
                            name:
                              description: Name is the Secret name.
                              minLength: 1
                              type: string
                            namespace:
                              description: Namespace is the Secret namespace. If empty,
                                the Pipeline's namespace is used.
                              type: string
                          required:
                          - name
                          type: object
                        timeoutSeconds:
                          default: 300
                          description: TimeoutSeconds is the per-call timeout. Defaults
                            to 300.
                          type: integer
                        url:
                          description: URL is the HTTP(S) endpoint to POST to.
                          minLength: 1
                          type: string
                      required:
                      - url
                      type: object
                  required:
                  - uses
                  type: object
                type: array
            type: object
          status:
            description: PromotionTemplateStatus defines the observed state of a PromotionTemplate.
            properties:
              conditions:
                description: Conditions reports status conditions for this template.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
