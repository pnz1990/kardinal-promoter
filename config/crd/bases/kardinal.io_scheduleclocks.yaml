---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: scheduleclocks.kardinal.io
spec:
  group: kardinal.io
  names:
    kind: ScheduleClock
    listKind: ScheduleClockList
    plural: scheduleclocks
    shortNames:
    - sc
    singular: scheduleclock
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.interval
      name: Interval
      type: string
    - jsonPath: .status.tick
      name: Last-Tick
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ScheduleClock is an Owned node that writes a timestamp to status.tick
          on a configurable interval, generating Kubernetes watch events. PolicyGates
          with schedule.* expressions reference the ScheduleClock in their Graph scope;
          each tick causes the Graph controller to re-evaluate all dependant nodes.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: ScheduleClockSpec defines the desired state of a ScheduleClock.
            properties:
              interval:
                default: 1m
                description: Interval is how often the ScheduleClock updates status.tick.
                  Uses Go duration format (e.g. "1m", "30s"). Minimum recommended
                  value is 30s.
                type: string
            type: object
          status:
            description: ScheduleClockStatus defines the observed state of a ScheduleClock.
            properties:
              tick:
                description: Tick is the RFC3339 timestamp written by the reconciler
                  on every interval. This field generates Kubernetes watch events.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
