---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: pipelines.kardinal.io
spec:
  group: kardinal.io
  names:
    kind: Pipeline
    listKind: PipelineList
    plural: pipelines
    shortNames:
    - pipe
    singular: pipeline
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .spec.paused
      name: Paused
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Pipeline defines a promotion pipeline for one application.
          It specifies the ordered environments an artifact Bundle travels through.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PipelineSpec defines the desired state of a Pipeline.
            properties:
              environments:
                description: Environments lists the promotion path in order.
                items:
                  description: EnvironmentSpec defines one environment in a Pipeline.
                  properties:
                    approval:
                      default: auto
                      description: Approval controls whether promotion into this environment
                        requires a PR review.
                      enum:
                      - auto
                      - pr-review
                      type: string
                    delivery:
                      description: Delivery holds in-cluster progressive delivery
                        delegation configuration.
                      properties:
                        delegate:
                          description: |-
                            Delegate offloads in-cluster progressive delivery to an external controller.
                            Supported values: none, argoRollouts, flagger.
                          type: string
                      type: object
                    dependsOn:
                      description: |-
                        DependsOn lists names of other environments in this pipeline that must
                        reach Verified state before this environment can start.
                      items:
                        type: string
                      type: array
                    health:
                      description: Health holds the health check configuration for
                        this environment.
                      properties:
                        cluster:
                          description: Cluster is the kubeconfig Secret name for remote
                            cluster health checks.
                          type: string
                        timeout:
                          description: |-
                            Timeout is the maximum time to wait for health checks to pass.
                            Uses Go duration format (e.g. "30m", "1h"). Defaults to "10m".
                          type: string
                        type:
                          description: |-
                            Type selects the health check backend.
                            Supported values: resource, argocd, flux, argoRollouts, flagger.
                          type: string
                      type: object
                    name:
                      description: Name is the environment identifier (e.g. "test",
                        "uat", "prod").
                      minLength: 1
                      type: string
                    path:
                      description: |-
                        Path is the subdirectory within the GitOps repository for this environment.
                        Used when spec.git.layout is "directory". Defaults to "environments/<name>".
                      type: string
                    shard:
                      description: |-
                        Shard pins this environment to a specific kardinal-controller agent shard
                        in distributed mode. Leave empty for single-controller deployments.
                      type: string
                    update:
                      description: Update holds the manifest update configuration
                        for this environment.
                      properties:
                        strategy:
                          default: kustomize
                          description: Strategy selects the manifest update strategy.
                          enum:
                          - kustomize
                          - helm
                          type: string
                      type: object
                  required:
                  - name
                  type: object
                minItems: 1
                type: array
              git:
                description: |-
                  Git holds the shared GitOps repository configuration for all
                  environments in this pipeline.
                properties:
                  branch:
                    description: Branch is the default base branch for this repository.
                    type: string
                  layout:
                    default: directory
                    description: |-
                      Layout controls how environment paths are organized in the repository.
                      "directory": environments as subdirectories on one branch (default).
                      "branch": environments as separate branches.
                    enum:
                    - directory
                    - branch
                    type: string
                  provider:
                    default: github
                    description: Provider is the SCM provider.
                    enum:
                    - github
                    - gitlab
                    type: string
                  secretRef:
                    description: SecretRef references a Kubernetes Secret containing
                      the SCM token.
                    properties:
                      name:
                        description: Name is the Secret name.
                        minLength: 1
                        type: string
                      namespace:
                        description: Namespace is the Secret namespace. If empty,
                          the Pipeline's namespace is used.
                        type: string
                    required:
                    - name
                    type: object
                  url:
                    description: URL is the GitOps repository URL (HTTPS).
                    minLength: 1
                    type: string
                required:
                - url
                type: object
              historyLimit:
                description: HistoryLimit is the number of completed Bundle promotions
                  to retain.
                type: integer
              paused:
                default: false
                description: Paused suspends all promotions in this pipeline when
                  true.
                type: boolean
              policyGates:
                description: |-
                  PolicyGates lists org- or team-level PolicyGate references that apply to
                  every promotion in this pipeline.
                items:
                  description: |-
                    PipelinePolicyGateRef is a reference to a PolicyGate that must pass before
                    any promotion in this pipeline can proceed.
                  properties:
                    name:
                      description: Name is the PolicyGate resource name.
                      minLength: 1
                      type: string
                    namespace:
                      description: Namespace is the PolicyGate resource namespace.
                      type: string
                  required:
                  - name
                  type: object
                type: array
            required:
            - environments
            - git
            type: object
          status:
            description: PipelineStatus defines the observed state of a Pipeline.
            properties:
              conditions:
                description: Conditions holds status conditions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                default: Unknown
                description: Phase is the overall pipeline phase.
                enum:
                - Ready
                - Degraded
                - Unknown
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
