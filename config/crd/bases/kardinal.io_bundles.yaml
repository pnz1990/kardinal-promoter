---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.17.3
  name: bundles.kardinal.io
spec:
  group: kardinal.io
  names:
    kind: Bundle
    listKind: BundleList
    plural: bundles
    shortNames:
    - bnd
    singular: bundle
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Bundle is an immutable, versioned snapshot of what to deploy.
          It carries build provenance and travels through a Pipeline's environments.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              BundleSpec defines the desired state of a Bundle.
              Full field definitions are added in Stage 1.
            properties:
              images:
                description: Images lists the container images included in this Bundle.
                items:
                  description: ImageRef identifies a container image.
                  properties:
                    digest:
                      description: Digest is the image digest (sha256:...).
                      type: string
                    repository:
                      description: Repository is the image repository (e.g. "ghcr.io/nginx/nginx").
                      type: string
                    tag:
                      description: Tag is the image tag.
                      type: string
                  required:
                  - repository
                  type: object
                type: array
              pipeline:
                description: Pipeline is the name of the Pipeline this Bundle targets.
                minLength: 1
                type: string
              type:
                default: image
                description: Type classifies the bundle content.
                enum:
                - image
                - config
                - mixed
                type: string
            required:
            - pipeline
            type: object
          status:
            description: BundleStatus defines the observed state of a Bundle.
            properties:
              conditions:
                description: Conditions holds status conditions.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                description: Phase is the bundle promotion phase.
                enum:
                - Available
                - Promoting
                - Verified
                - Failed
                - Superseded
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
