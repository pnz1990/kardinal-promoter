apiVersion: kardinal.io/v1alpha1
kind: Pipeline
metadata:
  name: nginx-demo
  namespace: default
  labels:
    app: nginx-demo
spec:
  git:
    url: https://github.com/myorg/gitops.git
    branch: main
    layout: directory
    provider: github
    secretRef:
      name: gitops-creds
      namespace: default
  environments:
    - name: test
      path: environments/test
      approvalMode: auto
      updateStrategy: kustomize
      healthAdapter: deployment
      healthTimeout: 30m
    - name: uat
      path: environments/uat
      approvalMode: auto
      updateStrategy: kustomize
      healthAdapter: deployment
      healthTimeout: 30m
      dependsOn:
        - test
    - name: prod
      path: environments/prod
      approvalMode: pr-review
      updateStrategy: kustomize
      healthAdapter: argocd
      healthTimeout: 60m
      deliveryDelegate: argoRollouts
      dependsOn:
        - uat
      shard: prod-cluster
  policyGates:
    - name: no-weekend-deploys
      namespace: platform-policies
  paused: false
  historyLimit: 20
