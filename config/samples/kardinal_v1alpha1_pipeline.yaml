apiVersion: kardinal.io/v1alpha1
kind: Pipeline
metadata:
  name: nginx-demo
  namespace: default
  labels:
    app: nginx-demo
spec:
  git:
    url: https://github.com/myorg/gitops.git
    branch: main
    layout: directory
    provider: github
    secretRef:
      name: gitops-creds
  environments:
    - name: test
      path: environments/test
      approval: auto
      update:
        strategy: kustomize
      health:
        type: deployment
        timeout: 30m
    - name: uat
      path: environments/uat
      approval: auto
      update:
        strategy: kustomize
      health:
        type: deployment
        timeout: 30m
      dependsOn:
        - test
    - name: prod
      path: environments/prod
      approval: pr-review
      update:
        strategy: kustomize
      health:
        type: argocd
        timeout: 60m
      delivery:
        delegate: argoRollouts
      dependsOn:
        - uat
      shard: prod-cluster
  policyGates:
    - name: no-weekend-deploys
      namespace: platform-policies
  paused: false
  historyLimit: 20
