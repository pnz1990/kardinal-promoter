# otherness-config.yaml — kardinal-promoter
# Single source of truth for all otherness/maqa/speckit agentic tooling.

# ── Project identity ──────────────────────────────────────────────────────────
project:
  name: kardinal-promoter
  repo: pnz1990/kardinal-promoter
  agent_version: 4daf5ea695f0147ac255dc434ccf703055e85a1c  # pin otherness to this SHA (security: doc 27 §M2)
  report_issue: 1
  board_url: https://github.com/users/pnz1990/projects/1
  pr_label: kardinal
  job_family: FEE

# ── MAQA runtime ──────────────────────────────────────────────────────────────
maqa:
  mode: standalone
  agents_path: ~/.otherness/agents
  max_parallel: 3

  # Operator has authorized agents to act on their behalf.
  # Enables --admin merge bypass when branch protection requires a human review.
  autonomous_mode: true

  # Max items to complete per session before SM/PM gate fires.
  # See docs/design/21-session-throughput.md (otherness repo).
  session_item_limit: 5    # 5 items ~50min, fits hourly window

  # Executive project status update to GitHub Projects board every N cycles.
  # Only the unbounded standalone posts these. 0 = disabled.
  status_update_cycles: 5

  # Product validation: run the actual product against user journeys every N cycles.
  # Opens bug/doc issues for failures. 0 = disabled.
  product_validation_cycles: 3

# ── CI gate ───────────────────────────────────────────────────────────────────
ci:
  provider: github-actions

  github_actions:
    workflow: ci.yml

  circleci:
    org_slug: ""
    project_slug: ""

  gitlab:
    base_url: https://gitlab.com
    project_id: ""

  bitbucket:
    workspace: ""
    repo_slug: ""

  wait_timeout_seconds: 1200
  block_on_red: true

