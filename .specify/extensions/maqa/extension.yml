schema_version: "1.0"

extension:
  id: "maqa"
  name: "MAQA — Multi-Agent & Quality Assurance"
  version: "0.2.0"
  description: "Two-mode autonomous agent framework: standalone (full team in one session) and bounded-standalone (scoped agent with injected boundary). Built on otherness."
  author: "GenieRobot"
  repository: "https://github.com/GenieRobot/spec-kit-maqa-ext"
  license: "MIT"

requires:
  speckit_version: ">=0.3.0"

provides:
  commands:
    - name: "speckit.maqa.standalone"
      file: "commands/speckit.maqa.standalone.md"
      description: "Full autonomous team in one session — coordinates, implements, reviews, releases. Reads agents_path from maqa-config.yml."

    - name: "speckit.maqa.bounded-standalone"
      file: "commands/speckit.maqa.bounded-standalone.md"
      description: "Scoped agent — boundary injected in prompt. Multiple sessions run concurrently. Posts hourly progress to a dedicated GitHub issue."

    - name: "speckit.maqa.setup"
      file: "commands/speckit.maqa.setup.md"
      description: "One-time setup: creates maqa-config.yml and installs agent files to agents_path."
