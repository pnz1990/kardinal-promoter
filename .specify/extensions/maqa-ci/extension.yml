schema_version: "1.0"

extension:
  id: "maqa-ci"
  name: "MAQA CI/CD Integration"
  version: "0.1.0"
  description: "CI/CD status gate for the MAQA workflow. Checks pipeline status on the feature branch before moving to In Review. Supports GitHub Actions, CircleCI, GitLab CI, and Bitbucket Pipelines."
  author: "GenieRobot"
  repository: "https://github.com/GenieRobot/spec-kit-maqa-ci"
  license: "MIT"
  homepage: "https://github.com/GenieRobot/spec-kit-maqa-ci"

requires:
  speckit_version: ">=0.3.0"

provides:
  commands:
    - name: "speckit.maqa-ci.setup"
      file: "commands/speckit.maqa-ci.setup.md"
      description: "Detect CI provider from repo structure and generate maqa-ci/ci-config.yml."

    - name: "speckit.maqa-ci.check"
      file: "commands/speckit.maqa-ci.check.md"
      description: "Check CI pipeline status for a given branch. Returns green, red, pending, or unknown. Called by coordinator before moving a feature to In Review."

  config:
    - name: "maqa-ci/ci-config.yml"
      template: "config-template.yml"
      description: "CI provider configuration for MAQA status gate"
      required: true

hooks:
  after_implement:
    command: "speckit.maqa-ci.check"
    optional: true
    prompt: "Check CI pipeline status before moving to review?"
    description: "Gate on CI status after implementation completes"

tags:
  - "ci"
  - "cd"
  - "github-actions"
  - "pipeline"
  - "quality-gate"
  - "maqa"
