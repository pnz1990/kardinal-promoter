name: otherness scheduled run

# kardinal-promoter: run every 6 hours (steady-state standby — all 7 journeys passing)
# Active development: "0 * * * *" (hourly). Standby: "0 */6 * * *" (every 6h).
# To change cadence: update the cron below.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:          # manual trigger for testing or immediate execution

jobs:
  otherness:
    runs-on: ubuntu-latest

    # ── Permissions ────────────────────────────────────────────────────────────
    # id-token: write  — AWS OIDC (Bedrock, no stored keys)
    # contents: write  — push commits, create/merge branches
    # pull-requests: write — open/update/merge PRs, post review comments
    # issues: write    — create/label/close issues, post comments
    # actions: write   — trigger other workflows after push
    # statuses: write  — post commit statuses
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
      statuses: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 0
          # Use GH_TOKEN (PAT) — pushes from a PAT trigger other workflows.
          # GITHUB_TOKEN pushes are intentionally inert to prevent loops.
          token: ${{ secrets.GH_TOKEN }}

      - name: Configure git identity
        run: |
          git config --global user.name  "otherness[bot]"
          git config --global user.email "otherness[bot]@users.noreply.github.com"

      - name: Install otherness agent files
        run: |
          git clone --quiet --depth 1 https://github.com/pnz1990/otherness.git ~/.otherness
          echo "[otherness] Agent files installed at ~/.otherness ($(git -C ~/.otherness rev-parse --short HEAD))"

      - name: Sync otherness command files
        run: |
          mkdir -p .opencode/command
          SYNCED=0
          for src in ~/.otherness/.opencode/command/otherness.*.md; do
            [ -f "$src" ] || continue
            fname=$(basename "$src"); dest=".opencode/command/$fname"
            if ! cmp -s "$src" "$dest" 2>/dev/null; then cp "$src" "$dest"; SYNCED=1; fi
          done
          for dest in .opencode/command/otherness.*.md; do
            [ -f "$dest" ] || continue
            fname=$(basename "$dest")
            if [ ! -f ~/.otherness/.opencode/command/"$fname" ]; then rm "$dest"; SYNCED=1; fi
          done
          [ $SYNCED -eq 1 ] && echo "[otherness] Command files synced." || echo "[otherness] Commands already current."

      - name: Configure AWS credentials (Bedrock via OIDC)
        uses: aws-actions/configure-aws-credentials@ff717079ee2060e4bcee96c4779b553acc87447c  # v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: otherness-bedrock
          aws-region: us-east-1

      - name: Authenticate gh CLI
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # GH_TOKEN env var is sufficient for `gh` CLI auth.
          # `gh auth login --with-token` fails when GH_TOKEN is already set in env.
          # We only need `gh auth setup-git` to configure the git credential helper.
          gh auth setup-git
          gh auth status

      - name: Verify GH_TOKEN scopes
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # Preflight: verify GH_TOKEN has the required OAuth scopes (repo + workflow).
          # If the token is expired or missing scopes, post a [NEEDS HUMAN] issue so the
          # failure is visible rather than producing a confusing mid-run failure.
          #
          # gh api /user returns a 200 with X-OAuth-Scopes header when the token is valid.
          # We use -i (include headers) and grep for the required scopes.
          SCOPES=$(gh api /user -i 2>/dev/null | grep -i '^x-oauth-scopes:' | head -1 || true)
          echo "Token scopes header: $SCOPES"

          MISSING=""
          echo "$SCOPES" | grep -qi 'repo' || MISSING="${MISSING}repo "
          echo "$SCOPES" | grep -qi 'workflow' || MISSING="${MISSING}workflow "

          if [ -n "$MISSING" ]; then
            echo "ERROR: GH_TOKEN is missing required scopes: $MISSING"
            REPO=$(git remote get-url origin | sed 's|.*github.com[:/]||;s|\.git$||')
            # Read report_issue from otherness-config.yaml
            REPORT_ISSUE=$(python3 -c "
          import re
          section = None
          for line in open('otherness-config.yaml'):
              s = re.match(r'^(\w[\w_]*):', line)
              if s: section = s.group(1)
              if section == 'project':
                  m = re.match(r'^\s+report_issue:\s*(\S+)', line)
                  if m: print(m.group(1)); break
          " 2>/dev/null || echo "1")
            # Avoid duplicate issues
            EXISTING=$(gh issue list --repo "$REPO" --state open \
              --search "[NEEDS HUMAN] GH_TOKEN expired" --json number --jq 'length' 2>/dev/null || echo "0")
            if [ "${EXISTING:-0}" -eq 0 ]; then
              gh issue create --repo "$REPO" \
                --title "[NEEDS HUMAN] GH_TOKEN expired or missing scopes — scheduled run blocked" \
                --label "needs-human" \
                --body "## Problem
The otherness scheduled workflow detected that \`GH_TOKEN\` is missing required scopes or has expired.

**Missing scopes**: \`$MISSING\`

## Fix
Generate a new PAT at https://github.com/settings/tokens with \`repo\` + \`workflow\` scopes, then:
\`\`\`
echo \"<new-token>\" | gh secret set GH_TOKEN --repo $REPO
\`\`\`

## Notes
- Run started at: $(date -u +%Y-%m-%dT%H:%M:%SZ)
- Preflight check: \`docs/design/13-scheduled-execution.md\` §Present" 2>/dev/null \
                && echo "Opened [NEEDS HUMAN] issue." || echo "Issue creation failed."
            else
              echo "NEEDS HUMAN issue already open — not creating duplicate."
              gh issue comment "$REPORT_ISSUE" --repo "$REPO" \
                --body "[PREFLIGHT] GH_TOKEN missing scopes: $MISSING. Scheduled run skipped." 2>/dev/null || true
            fi
            exit 1
          fi

          echo "GH_TOKEN scopes OK (repo + workflow present)."

      - name: Run otherness
        uses: anomalyco/opencode/github@23fb5e0516c99ac04a1aa46c193efda2e1b9bb24  # v1.14.18
        env:
          # Bedrock credentials — injected by the OIDC step above
          AWS_REGION: us-east-1
          # GitHub — full PAT for push, PR, review, issue, and workflow trigger
          GH_TOKEN:     ${{ secrets.GH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          # Auto-approve all tool permissions in CI — no interactive TTY available.
          # Without this, ctx.ask() blocks indefinitely waiting for user approval.
          OPENCODE_PERMISSION: '{"bash":"allow","read":"allow","edit":"allow","write":"allow","glob":"allow","grep":"allow","list":"allow","external_directory":"allow","webfetch":"allow","task":"allow","todowrite":"allow","skill":"allow"}'
        with:
          model: amazon-bedrock/global.anthropic.claude-sonnet-4-6
          # use_github_token: true — skip the OpenCode App OIDC exchange.
          use_github_token: "true"
          prompt: |
            AGENTS_PATH=$(python3 -c "
            import re, os
            section = None
            for line in open('otherness-config.yaml'):
                s = re.match(r'^(\w[\w_]*):', line)
                if s: section = s.group(1)
                if section == 'maqa':
                    m = re.match(r'^\s+agents_path:\s*[\"\'']?([^\"\'#\n]+)[\"\'']?', line)
                    if m: print(os.path.expanduser(m.group(1).strip())); break
            " 2>/dev/null || echo "$HOME/.otherness/agents")

            # Security: validate agents_path is within ~/.otherness (doc 27 §M6)
            ALLOWED_PREFIX="$HOME/.otherness"
            if [[ "$AGENTS_PATH" != "$ALLOWED_PREFIX"* ]]; then
              echo "Security: agents_path '$AGENTS_PATH' outside allowed prefix. Refusing."
              exit 1
            fi

            Read and follow $AGENTS_PATH/standalone.md.
