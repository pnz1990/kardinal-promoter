name: otherness security checks

# Runs on every PR to enforce:
#   M8: AGENTS.md changes require collaborator — block prompt injection via merged PR
#   M10: otherness label restriction — prevent external queue injection

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    types: [opened, synchronize, reopened]
  issues:
    types: [labeled]

jobs:
  # ── No-op: handle push events gracefully ─────────────────────────────────
  # Security checks only apply on pull_request (M8) and issues (M10) events.
  # This no-op job runs on push so GitHub doesn't report a failed 0-job run.
  noop:
    name: no-op (push — security checks are PR/issue only)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Security checks only run on pull_request and issues events."

  # ── M8: AGENTS.md change detection ────────────────────────────────────────
  agents-md-guard:
    name: M8 — AGENTS.md security check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Check if AGENTS.md was modified
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          # Check if AGENTS.md is in the changed files
          CHANGED=$(gh api "repos/$REPO/pulls/$PR_NUMBER/files" \
            --jq '[.[] | .filename] | contains(["AGENTS.md"])' 2>/dev/null || echo "false")

          if [ "$CHANGED" != "true" ]; then
            echo "AGENTS.md not modified — no security check needed."
            exit 0
          fi

          echo "::warning::AGENTS.md was modified in this PR."

          # Check if the PR author has write access
          PERM=$(gh api "repos/$REPO/collaborators/$AUTHOR/permission" \
            --jq '.permission' 2>/dev/null || echo "none")

          if [[ "$PERM" == "admin" || "$PERM" == "write" || "$PERM" == "maintain" ]]; then
            echo "✅ AGENTS.md modified by collaborator ($AUTHOR, $PERM) — permitted."
            SECURITY_BODY="⚠️ AGENTS.md modified in this PR. This file controls agent behavior. Reviewer: verify no agents_path redirect, no secret exfiltration, no out-of-org pushes."
            gh pr comment $PR_NUMBER --repo $REPO --body "$SECURITY_BODY" 2>/dev/null || true
            
