name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write
  id-token: write       # required for OIDC-based cosign keyless signing
  attestations: write   # required for actions/attest-build-provenance (SLSA)

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5.2.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set version from tag
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Set up Docker Buildx (multi-arch)
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run tests
        run: go test ./... -race -count=1 -timeout 120s

      - name: Build CLI and controller binaries
        run: |
          mkdir -p dist
          # Controller (linux only — packaged in Docker image)
          GOOS=linux GOARCH=amd64 go build \
            -ldflags="-X main.version=${VERSION} -X main.commit=${GITHUB_SHA}" \
            -o dist/kardinal-controller-linux-amd64 \
            ./cmd/kardinal-controller/
          GOOS=linux GOARCH=arm64 go build \
            -ldflags="-X main.version=${VERSION} -X main.commit=${GITHUB_SHA}" \
            -o dist/kardinal-controller-linux-arm64 \
            ./cmd/kardinal-controller/
          # CLI (multi-platform)
          GOOS=linux   GOARCH=amd64 go build -ldflags="-X main.version=${VERSION}" -o dist/kardinal-linux-amd64   ./cmd/kardinal/
          GOOS=linux   GOARCH=arm64 go build -ldflags="-X main.version=${VERSION}" -o dist/kardinal-linux-arm64   ./cmd/kardinal/
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-X main.version=${VERSION}" -o dist/kardinal-darwin-amd64  ./cmd/kardinal/
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-X main.version=${VERSION}" -o dist/kardinal-darwin-arm64  ./cmd/kardinal/
          GOOS=windows GOARCH=amd64 go build -ldflags="-X main.version=${VERSION}" -o dist/kardinal-windows-amd64.exe ./cmd/kardinal/

      # ── Build krocodile image ──────────────────────────────────────────────
      # We build and push the krocodile Graph controller image ourselves so
      # that every kardinal release bundles a known-good, versioned krocodile
      # image. Users do not need to run hack/install-krocodile.sh.
      - name: Read pinned krocodile commit
        id: krocodile
        run: |
          COMMIT=$(grep 'KROCODILE_COMMIT:-' hack/install-krocodile.sh | grep -o '[a-f0-9]\{7,40\}' | head -1)
          echo "KROCODILE_COMMIT=${COMMIT}" >> $GITHUB_ENV
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          echo "Pinned krocodile commit: ${COMMIT}"

      - name: Clone krocodile at pinned commit
        run: |
          git clone --quiet --no-tags --depth=500 \
            https://github.com/ellistarn/kro.git /tmp/kro -b krocodile
          git -C /tmp/kro fetch --depth=1 origin ${{ steps.krocodile.outputs.commit }} || \
            git -C /tmp/kro fetch --unshallow
          git -C /tmp/kro checkout ${{ steps.krocodile.outputs.commit }}
          echo "krocodile checked out at $(git -C /tmp/kro rev-parse --short HEAD)"

      - name: Build krocodile binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            GOTOOLCHAIN=auto go build \
            -ldflags="-w -s" \
            -o /tmp/kro/bin/graph-controller-amd64 \
            /tmp/kro/experimental/cmd/
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 \
            GOTOOLCHAIN=auto go build \
            -ldflags="-w -s" \
            -o /tmp/kro/bin/graph-controller-arm64 \
            /tmp/kro/experimental/cmd/
        working-directory: /tmp/kro

      - name: Build and push krocodile image (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: /tmp/kro
          file: hack/Dockerfile.krocodile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/pnz1990/kardinal-promoter/krocodile:${{ env.KROCODILE_COMMIT }}
            ghcr.io/pnz1990/kardinal-promoter/krocodile:${{ env.VERSION }}
          labels: |
            org.opencontainers.image.title=krocodile-graph-controller
            org.opencontainers.image.description=krocodile Graph controller bundled with kardinal-promoter
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.revision=${{ env.KROCODILE_COMMIT }}
            org.opencontainers.image.source=https://github.com/ellistarn/kro/tree/krocodile

      # ── Build kardinal-promoter controller image ───────────────────────────
      - name: Build and push kardinal-promoter controller image (multi-arch)
        id: build-controller
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/pnz1990/kardinal-promoter/controller:${{ env.VERSION }}
            ghcr.io/pnz1990/kardinal-promoter/controller:latest
          labels: |
            org.opencontainers.image.title=kardinal-promoter-controller
            org.opencontainers.image.version=${{ env.VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}

      # ── SLSA Level 2 provenance ──────────────────────────────────────────────
      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/pnz1990/kardinal-promoter/controller
          subject-digest: ${{ steps.build-controller.outputs.digest }}

      # ── Cosign keyless image signing ──────────────────────────────────────────
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.4.3

      - name: Sign controller image with cosign (keyless — GitHub Actions OIDC)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign sign --yes \
            ghcr.io/pnz1990/kardinal-promoter/controller:${{ env.VERSION }}

      # ── SBOM generation ─────────────────────────────────────────────────────
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0.18.0
        with:
          image: ghcr.io/pnz1990/kardinal-promoter/controller:${{ env.VERSION }}
          artifact-name: sbom-controller.spdx.json
          output-file: ./sbom-controller.spdx.json
          format: spdx-json

      - name: Attach SBOM as cosign attestation
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          cosign attest --yes \
            --predicate sbom-controller.spdx.json \
            --type spdxjson \
            ghcr.io/pnz1990/kardinal-promoter/controller:${{ env.VERSION }}

      # ── Vulnerability scanning ──────────────────────────────────────────────
      # Scan and report CVEs in the SARIF format for GitHub Security tab.
      # exit-code: 0 — report findings but do NOT block the release.
      # Rationale: the image is already pushed to ghcr.io at this point.
      # Blocking here leaves a published image without a GitHub Release entry.
      # CVE remediation is tracked separately via Dependabot and the SARIF report.
      - name: Scan controller image for HIGH/CRITICAL CVEs (trivy)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/pnz1990/kardinal-promoter/controller:${{ env.VERSION }}
          format: sarif
          output: trivy-controller-results.sarif
          severity: HIGH,CRITICAL
          exit-code: 0
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload trivy SARIF report (controller)
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-controller-results.sarif
          category: trivy-controller
        continue-on-error: true

      - name: Scan krocodile image for HIGH/CRITICAL CVEs (trivy)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ghcr.io/pnz1990/kardinal-promoter/krocodile:${{ env.KROCODILE_COMMIT }}
          format: sarif
          output: trivy-krocodile-results.sarif
          severity: HIGH,CRITICAL
          exit-code: 0
          ignore-unfixed: true
        continue-on-error: true

      - name: Upload trivy SARIF report (krocodile)
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-krocodile-results.sarif
          category: trivy-krocodile
        continue-on-error: true

      # ── Package and publish Helm chart ─────────────────────────────────────
      - name: Update chart version and krocodile tag
        run: |
          # Stamp chart version and krocodile image tag into values.yaml
          sed -i "s|tag: \"\"  # defaults to krocodile.pinnedCommit|tag: \"${KROCODILE_COMMIT}\"|g" \
            chart/kardinal-promoter/values.yaml || true
          # The chart uses the tag from values.yaml; also update Chart.yaml
          sed -i "s|^appVersion:.*|appVersion: \"${VERSION}\"|" chart/kardinal-promoter/Chart.yaml
          sed -i "s|^version:.*|version: ${VERSION#v}|" chart/kardinal-promoter/Chart.yaml

      - name: Package Helm chart
        run: |
          helm package chart/kardinal-promoter \
            --version ${VERSION#v} \
            --app-version ${VERSION} \
            --destination dist/

      - name: Push Helm chart to OCI registry
        run: |
          helm push dist/kardinal-promoter-*.tgz oci://ghcr.io/pnz1990/charts

      # ── GitHub release ─────────────────────────────────────────────────────
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges | head -20)
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$COMMITS" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.VERSION }}
          name: kardinal-promoter ${{ env.VERSION }}
          body: |
            ## kardinal-promoter ${{ env.VERSION }}

            ### Changes
            ${{ env.CHANGELOG }}

            ### Install (single command — includes krocodile)

            ```bash
            helm install kardinal-promoter oci://ghcr.io/pnz1990/charts/kardinal-promoter \
              --namespace kardinal-system --create-namespace \
              --version ${{ env.VERSION }} \
              --set github.secretRef.name=github-token
            ```

            > No separate krocodile install needed. The chart bundles and installs
            > krocodile (commit `${{ env.KROCODILE_COMMIT }}`) automatically.
            > Use `--set krocodile.enabled=false` if you already run krocodile.

            ### CLI

            ```bash
            # macOS (Apple Silicon)
            curl -LO https://github.com/pnz1990/kardinal-promoter/releases/download/${{ env.VERSION }}/kardinal-darwin-arm64
            chmod +x kardinal-darwin-arm64 && sudo mv kardinal-darwin-arm64 /usr/local/bin/kardinal

            # macOS (Intel)
            curl -LO https://github.com/pnz1990/kardinal-promoter/releases/download/${{ env.VERSION }}/kardinal-darwin-amd64
            chmod +x kardinal-darwin-amd64 && sudo mv kardinal-darwin-amd64 /usr/local/bin/kardinal

            # Linux
            curl -LO https://github.com/pnz1990/kardinal-promoter/releases/download/${{ env.VERSION }}/kardinal-linux-amd64
            chmod +x kardinal-linux-amd64 && sudo mv kardinal-linux-amd64 /usr/local/bin/kardinal
            ```

            ### Container images

            | Image | Tag | Platform |
            |---|---|---|
            | `ghcr.io/pnz1990/kardinal-promoter/controller` | `${{ env.VERSION }}` | linux/amd64, linux/arm64 |
            | `ghcr.io/pnz1990/kardinal-promoter/krocodile` | `${{ env.KROCODILE_COMMIT }}` | linux/amd64, linux/arm64 |
          files: dist/*
          draft: false
          prerelease: ${{ contains(env.VERSION, '-') }}
