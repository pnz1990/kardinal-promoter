name: E2E Journey Tests

# Runs on push to main (to verify all journeys after merge), on-demand,
# and on a daily schedule (per issue #399 — automated evidence for TestJourney1Quickstart).
on:
  push:
    branches: [main]
  schedule:
    # Run daily at 02:00 UTC to produce automated CI evidence (issue #399).
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      journey:
        description: 'Journey to run (1-7, or all)'
        required: true
        default: 'all'
        type: choice
        options: ['all', '1', '2', '3', '4', '5', '6', '7']

# Cancel in-progress runs on new main pushes; keep scheduled/manual runs independent.
concurrency:
  group: e2e-${{ github.event_name == 'push' && github.ref || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

jobs:
  # Cancel any in-progress e2e run when a new push to main supersedes it.
  # Scheduled and manual runs get unique groups so they are never cancelled.
  e2e:
    name: e2e journey ${{ github.event.inputs.journey || 'all' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Note: GOTOOLCHAIN is NOT set at job level. The krocodile install step needs
    # GOTOOLCHAIN=auto to download go1.26+ for building the krocodile controller.
    # Our own build steps set GOTOOLCHAIN=local explicitly.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v5.2.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind
        run: |
          curl -Lo kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
          chmod +x kind && sudo mv kind /usr/local/bin/

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Create kind cluster
        run: kind create cluster --name kardinal-e2e --config test/e2e/kind-config.yaml

      - name: Install krocodile Graph controller
        run: |
          # Builds krocodile from the pinned commit, containerises it, loads into kind,
          # and applies CRDs + RBAC + Deployment. See hack/install-krocodile.sh.
          KIND_CLUSTER=kardinal-e2e bash hack/install-krocodile.sh

      - name: Build and load controller image
        env:
          GOTOOLCHAIN: local
        run: |
          make docker-build IMG=ghcr.io/pnz1990/kardinal-promoter:dev
          kind load docker-image ghcr.io/pnz1990/kardinal-promoter:dev --name kardinal-e2e

      - name: Build kardinal CLI binary
        env:
          GOTOOLCHAIN: local
        run: |
          # Build the CLI so TestJourney5CLI can find and run it
          make build-cli
          sudo cp bin/kardinal /usr/local/bin/kardinal
          kardinal version || echo "CLI built (version command may need cluster)"

      - name: Install kardinal-promoter
        env:
          GOTOOLCHAIN: local
        run: |
          # Disable ValidatingAdmissionPolicy in kind/k8s 1.29 — VAP is beta in 1.29
          # and requires feature gate enablement via kubeadm which breaks cluster startup.
          # VAP graduates to stable in k8s 1.30; re-enable when cluster is upgraded.
          make manifests
          kubectl apply -f config/crd/bases/
          # krocodile is already installed by the prior step (hack/install-krocodile.sh).
          # Disabling krocodile.enabled prevents Helm from trying to adopt the existing
          # kro-system namespace (which lacks Helm management labels) and failing with
          # "invalid ownership metadata".
          helm upgrade --install kardinal chart/kardinal-promoter \
            --namespace kardinal-system --create-namespace \
            --set validatingAdmissionPolicy.enabled=false \
            --set krocodile.enabled=false

      - name: Verify both controllers are running
        run: |
          kubectl get pods -n kro-system
          kubectl get pods -n kardinal-system
          kubectl get crd graphs.experimental.kro.run

      - name: Run selected journeys
        env:
          GOTOOLCHAIN: local
        run: |
          mkdir -p test/e2e/results
          JOURNEY="${{ github.event.inputs.journey || 'all' }}"
          if [ "$JOURNEY" = "all" ]; then
            go test ./test/e2e/... -v -timeout 25m 2>&1 | tee test/e2e/results/e2e-output.txt
          else
            go test ./test/e2e/... -run "TestJourney${JOURNEY}" -v -timeout 25m 2>&1 | tee test/e2e/results/e2e-output.txt
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results-${{ github.run_id }}
          path: test/e2e/results/

      - name: Cleanup kind cluster
        if: always()
        run: kind delete cluster --name kardinal-e2e
