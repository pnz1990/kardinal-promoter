name: E2E Journey Tests

# Runs on-demand or on a schedule — not on every PR (expensive).
# Triggered when a journey is ready (t.Skip removed) or by the coordinator.
on:
  workflow_dispatch:
    inputs:
      journey:
        description: 'Journey to run (1-5, or all)'
        required: true
        default: 'all'
        type: choice
        options: ['all', '1', '2', '3', '4', '5']
  schedule:
    # Run all journeys nightly at 02:00 UTC
    - cron: '0 2 * * *'

jobs:
  e2e:
    name: e2e journey ${{ github.event.inputs.journey || 'all' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind
        run: |
          curl -Lo kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
          chmod +x kind && sudo mv kind /usr/local/bin/

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Create kind cluster
        run: kind create cluster --name kardinal-e2e --config test/e2e/kind-config.yaml

      - name: Install Graph controller
        run: |
          # Install kro Graph controller (experimental)
          # Placeholder: replace with actual install once Graph is packaged
          echo "Graph controller install: TBD in Stage 3"

      - name: Build and load controller image
        run: |
          make docker-build
          kind load docker-image ghcr.io/pnz1990/kardinal-promoter:dev --name kardinal-e2e

      - name: Install kardinal-promoter
        run: |
          make install
          kubectl apply -f config/manager/

      - name: Run selected journeys
        run: |
          JOURNEY="${{ github.event.inputs.journey || 'all' }}"
          if [ "$JOURNEY" = "all" ]; then
            go test ./test/e2e/... -v -timeout 25m
          else
            go test ./test/e2e/... -run "TestJourney${JOURNEY}" -v -timeout 25m
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results-${{ github.run_id }}
          path: test/e2e/results/

      - name: Cleanup kind cluster
        if: always()
        run: kind delete cluster --name kardinal-e2e
