name: E2E Journey Tests

# Runs on push to main (to verify all journeys after merge) and on-demand.
# Not on every PR — cluster setup is expensive (~5-10 min).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      journey:
        description: 'Journey to run (1-7, or all)'
        required: true
        default: 'all'
        type: choice
        options: ['all', '1', '2', '3', '4', '5', '6', '7']

jobs:
  e2e:
    name: e2e journey ${{ github.event.inputs.journey || 'all' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install kind
        run: |
          curl -Lo kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
          chmod +x kind && sudo mv kind /usr/local/bin/

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/

      - name: Create kind cluster
        run: kind create cluster --name kardinal-e2e --config test/e2e/kind-config.yaml

      - name: Install krocodile Graph controller
        run: |
          # Builds krocodile from the pinned commit, containerises it, loads into kind,
          # and applies CRDs + RBAC + Deployment. See hack/install-krocodile.sh.
          KIND_CLUSTER=kardinal-e2e bash hack/install-krocodile.sh

      - name: Build and load controller image
        run: |
          make docker-build IMG=ghcr.io/pnz1990/kardinal-promoter:dev
          kind load docker-image ghcr.io/pnz1990/kardinal-promoter:dev --name kardinal-e2e

      - name: Install kardinal-promoter
        run: |
          make install
          kubectl apply -f config/manager/

      - name: Verify both controllers are running
        run: |
          kubectl get pods -n kro-system
          kubectl get pods -n kardinal-system
          kubectl get crd graphs.experimental.kro.run

      - name: Run selected journeys
        run: |
          mkdir -p test/e2e/results
          JOURNEY="${{ github.event.inputs.journey || 'all' }}"
          if [ "$JOURNEY" = "all" ]; then
            go test ./test/e2e/... -v -timeout 25m 2>&1 | tee test/e2e/results/e2e-output.txt
          else
            go test ./test/e2e/... -run "TestJourney${JOURNEY}" -v -timeout 25m 2>&1 | tee test/e2e/results/e2e-output.txt
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-results-${{ github.run_id }}
          path: test/e2e/results/

      - name: Cleanup kind cluster
        if: always()
        run: kind delete cluster --name kardinal-e2e
