# kardinal-promoter — Autonomous Team Configuration
#
# WORKFLOW:
#   Human:       defines vision + roadmap → checks board → unblocks escalations
#   Coordinator: generates queue → creates items → assigns engineers → tracks state → reports
#   Engineer:    TDD → self-validate → push PR → monitor CI → respond to QA → merge → smoke test
#   QA:          continuous PR watcher → full checklist → re-review after fixes → escalate
#
# Human NEVER creates queue files, item files, or code.
# Coordinator generates all artifacts autonomously.

version: "1.1"

# ── Source of Truth ─────────────────────────────────────────────────────────
source_of_truth:
  - docs/aide/vision.md
  - docs/aide/roadmap.md
  - docs/aide/progress.md
  - .specify/memory/constitution.md
  - docs/aide/team.yml
  - AGENTS.md

# ── Roles ────────────────────────────────────────────────────────────────────
roles:

  coordinator:
    command: /speckit.maqa.coordinator
    loop: continuous
    stop_condition: all 20 roadmap stages complete
    rules:
      - Never implement features. Never commit. Never push. Never merge.
      - Do not assign an item if its Depends-on items are not state=done.
      - Keep max 3 items in in_progress or in_review simultaneously.
      - When an item is blocked, continue assigning others.
      - Post [BATCH COMPLETE] to Issue #1 after each queue batch.
      - Post [NEEDS HUMAN] to Issue #1 when any item hits needs-human.
      - Generate next queue automatically when current queue exhausts.

  engineer:
    command: /speckit.maqa.feature
    loop: continuous
    stop_condition: coordinator marks slot idle or needs-human after 2 retries
    owns_feature_e2e: true
    merge_owner: true
    rules:
      - Work ONLY in the assigned worktree. Never touch main repo during implementation.
      - TDD strict: test file before implementation file, always.
      - Manually validate against examples/ before pushing. Include kubectl output in PR.
      - Monitor CI every 3 minutes after push. Fix red CI before waiting for QA.
      - Poll QA review every 5 minutes. Fix all requested changes before re-pushing.
      - Merge PR yourself after QA approves AND CI is green.
      - Run go build ./... on main after merge (smoke test). Open hotfix issue if it fails.
      - Clean up worktree after merge via /speckit.worktree.clean.
      - Max 2 retries on any blocker before escalating to needs-human.
      - Never add a Go module dependency without labeling the issue needs-human first.

  qa:
    command: /speckit.maqa.qa
    loop: continuous
    poll_interval: 2m
    stop_condition: no open PRs AND final [BATCH COMPLETE] posted
    re_review_policy: full_diff_every_time
    rules:
      - Review every PR labeled kardinal that has new commits since last review.
      - Never approve based on partial re-review. Always re-read the full diff.
      - Every checklist item must pass. Fail one = request-changes.
      - Provide file:line references for every issue raised.
      - Escalate to [QA FINDING] on Issue #1 after same issue appears 3+ times.
      - Post severity on findings: low | medium | high.

# ── Work Item Lifecycle ──────────────────────────────────────────────────────
lifecycle:
  states:
    - backlog     # in queue, dependencies not met
    - todo        # ready to start, coordinator assigned
    - in_progress # engineer working (TDD → self-validate → PR)
    - in_review   # PR open, CI green, QA reviewing
    - done        # PR merged by engineer, smoke test passed

  merge_owner: engineer
  state_file: .maqa/state.json

  state_machine:
    backlog -> todo:       coordinator validates all dependencies are done
    todo -> in_progress:   coordinator assigns + creates worktree
    in_progress -> in_review: engineer: tests pass + self-validate + CI green + PR open
    in_review -> in_progress: QA requests changes
    in_review -> done:     QA approves + CI green + engineer merges + smoke test passes
    in_progress -> backlog: engineer blocked after 2 retries

# ── Dependency Enforcement ───────────────────────────────────────────────────
dependencies:
  enforcement: strict
  check: coordinator reads spec.md Depends-on field, verifies state=done in state.json
  parallel_ok: true

# ── CI Gate ──────────────────────────────────────────────────────────────────
ci_gate:
  config: maqa-ci/ci-config.yml
  provider: github_actions
  workflow: ci.yml
  required_jobs:
    - build        # go vet, go test -race, go build, headers, banned files
    - go-sum-integrity
  block_on_red: true
  timeout_minutes: 20

# ── Branch Protection (enforced at GitHub repo level) ────────────────────────
branch_protection:
  branch: main
  require_pr: true
  required_approvals: 1       # QA agent approval
  dismiss_stale_reviews: true
  allow_force_pushes: false
  allow_deletions: false
  # Note: CI required_status_checks added when first CI run completes

# ── PR Protocol ──────────────────────────────────────────────────────────────
pr_protocol:
  base_branch: main
  require_ci: true
  require_qa_approval: true
  merge_method: squash
  delete_branch_on_merge: true
  template: docs/aide/pr-template.md
  required_in_pr_body:
    - item_id
    - spec_reference
    - acceptance_criteria_checked
    - go_test_output
    - verify_tasks_output
    - kubectl_validation_output

# ── State File ───────────────────────────────────────────────────────────────
state:
  file: .maqa/state.json
  write_strategy: atomic     # write to .maqa/state.json.tmp, then rename
  # Multiple agents write state. To prevent corruption:
  # Each agent reads the file, modifies only its own item's state,
  # writes back atomically. Agents poll; they do not hold locks.

# ── Queue Protocol ───────────────────────────────────────────────────────────
queue:
  dir: docs/aide/queue/
  items_dir: docs/aide/items/
  batch_size: 10
  naming: queue-NNN.md  (001, 002, ...)
  coordinator_generates: true  # human never creates queue files

# ── Worktree Convention ──────────────────────────────────────────────────────
worktrees:
  base: ..   # sibling of the main repo directory
  naming: kardinal-promoter.<feature-branch>
  # Example: ../kardinal-promoter.001-graph-integration
  create_command: /speckit.worktree.create
  clean_command: /speckit.worktree.clean
  engineer_reads_path_from: .maqa/state.json  # coordinator writes worktree_path per item

# ── Reporting ────────────────────────────────────────────────────────────────
reporting:
  issue_number: 1
  issue_url: https://github.com/pnz1990/kardinal-promoter/issues/1
  label: report
  post_command: "gh issue comment 1 --body \"{body}\""

  events:

    batch_complete:
      trigger: all items in current queue batch reach done or blocked
      format: |
        ## [BATCH COMPLETE] {queue_id} — {timestamp}

        **Shipped** ({done_count}):
        {for each done item}- {item_id}: {title} — PR #{pr} merged ✅
        {end}
        **Blocked** ({blocked_count}):
        {for each blocked item}- {item_id}: {title} — see issue #{issue}
        {end}
        **Progress**: {stages_done}/{stages_total} roadmap stages complete
        **Next queue**: {next_queue_id} generating now

    needs_human:
      trigger: any agent labels an issue needs-human
      format: |
        ## [NEEDS HUMAN] {item_id}: {title} — {timestamp}

        **Agent role**: {coordinator|engineer|qa}
        **Blocked on**: {reason}
        **Issue**: {issue_url}
        **Action**: Review the issue, provide the answer, remove the `needs-human` label.

    qa_finding:
      trigger: QA escalates after 3+ failed fix attempts
      format: |
        ## [QA FINDING] {item_id}: {title} — {timestamp}

        **Severity**: {low|medium|high}
        **PR**: #{pr_number}
        **File**: {file}:{line}
        **Finding**: {description}
        **Action required**: {recommended_action}

# ── Communication Protocol ───────────────────────────────────────────────────
communication:
  state_file: .maqa/state.json
  labels:
    blocked: "f97316"       # orange — dependency not met
    needs_human: "e11d48"   # red — human decision required
    report: "0075ca"        # blue — coordinator progress reports
  max_retries_before_escalation: 2

# ── Human-in-the-Loop Gates ─────────────────────────────────────────────────
human_gates:
  - type: new_go_dependency
    description: Adding any entry to go.mod require block
    action: label needs-human, write the module name and why it's needed

  - type: crd_api_change
    description: Any change to CRD field names, types, or required fields not in the spec
    action: label needs-human, describe the divergence from spec

  - type: go_interface_change
    description: Changing an interface signature in pkg/ that other packages depend on
    action: label needs-human, describe impact

  - type: spec_contradiction
    description: Spec says X but user docs/examples require Y
    action: label needs-human, quote both sources exactly

  - type: unexplained_test_failure
    description: Tests fail in CI with no clear cause after 2 fix attempts
    action: label needs-human, paste full CI log

  - type: security_finding
    description: QA identifies a potential security vulnerability
    action: label needs-human, high severity [QA FINDING] on Issue #1

# ── Board ────────────────────────────────────────────────────────────────────
board:
  provider: github-projects
  url: https://github.com/users/pnz1990/projects/1
  config: maqa-github-projects/github-projects-config.yml
  columns:
    todo: "Todo"
    in_progress: "In Progress"
    in_review: "In Review"
    done: "Done"
