# demo/manifests/argocd/applications.yaml
#
# ArgoCD Applications for the demo environment.
# These point at the kardinal-demo GitOps repository which kardinal
# commits kustomize patches to when promoting a Bundle.
#
# Copyright 2026 The kardinal-promoter Authors.
# Licensed under the Apache License, Version 2.0
---
apiVersion: v1
kind: Namespace
metadata:
  name: argocd
---
# Test environment
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kardinal-test-app-test
  namespace: argocd
  labels:
    demo: "true"
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/pnz1990/kardinal-demo
    targetRevision: main
    path: environments/test
  destination:
    server: https://kubernetes.default.svc
    namespace: kardinal-test-app-test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# UAT environment
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kardinal-test-app-uat
  namespace: argocd
  labels:
    demo: "true"
spec:
  project: default
  source:
    repoURL: https://github.com/pnz1990/kardinal-demo
    targetRevision: main
    path: environments/uat
  destination:
    server: https://kubernetes.default.svc
    namespace: kardinal-test-app-uat
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# Prod environment
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kardinal-test-app-prod
  namespace: argocd
  labels:
    demo: "true"
spec:
  project: default
  source:
    repoURL: https://github.com/pnz1990/kardinal-demo
    targetRevision: main
    path: environments/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: kardinal-test-app-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
