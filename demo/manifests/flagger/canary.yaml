apiVersion: apps/v1
kind: Deployment
metadata:
  name: kardinal-test-app-flagger
  namespace: kardinal-test-app-test
  labels:
    app: kardinal-test-app-flagger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kardinal-test-app-flagger
  template:
    metadata:
      labels:
        app: kardinal-test-app-flagger
    spec:
      containers:
        - name: app
          image: ghcr.io/pnz1990/kardinal-test-app:sha-abc1234
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: kardinal-test-app-flagger
  namespace: kardinal-test-app-test
spec:
  selector:
    app: kardinal-test-app-flagger
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: kardinal-test-app-flagger
  namespace: kardinal-test-app-test
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kardinal-test-app-flagger
  progressDeadlineSeconds: 120   # 2 minutes for demo/CI
  service:
    port: 80
    targetPort: 8080
  analysis:
    interval: 10s      # fast for demo/CI
    threshold: 3       # 3 successful iterations → promote
    maxWeight: 50
    stepWeight: 25
    # No metrics — Flagger promotes on iteration count alone (no service mesh needed)
