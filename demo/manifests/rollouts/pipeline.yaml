apiVersion: kardinal.io/v1alpha1
kind: Pipeline
metadata:
  name: kardinal-test-app-rollouts
  namespace: default
spec:
  environments:
  - approval: auto
    health:
      timeout: 3m
      type: argoRollouts
    name: test
    path: environments/test
    update:
      strategy: kustomize
  git:
    branch: main
    layout: directory
    provider: github
    secretRef:
      name: github-token
    url: https://github.com/pnz1990/kardinal-demo
  historyLimit: 5
