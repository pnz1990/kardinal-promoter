apiVersion: kardinal.io/v1alpha1
kind: Pipeline
metadata:
  name: kardinal-test-app-rollouts
  namespace: default
spec:
  git:
    url: https://github.com/pnz1990/kardinal-demo
    branch: main
    layout: directory
    provider: github
    secretRef:
      name: github-token
  environments:
    - name: test
      path: environments/test
      update:
        strategy: kustomize
      approval: auto
      health:
        type: argoRollouts
        argoRollouts:
          name: kardinal-test-app-rollouts
          namespace: kardinal-test-app-test
        timeout: 3m
  historyLimit: 5
