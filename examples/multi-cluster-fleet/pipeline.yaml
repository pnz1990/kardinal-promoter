apiVersion: kardinal.io/v1alpha1
kind: Pipeline
metadata:
  name: rollouts-demo
  namespace: default
spec:
  git:
    url: https://github.com/myorg/rollouts-demo-deploy
    branch: main
    layout: directory
    provider: github
    secretRef:
      name: github-token

  environments:
    # Test: auto-promote, instant deploy
    - name: test
      path: env/test
      update:
        strategy: kustomize
      approval: auto
      health:
        type: argocd   # Application name defaults to rollouts-demo-test in namespace argocd

    # Pre-prod: PR approval, instant deploy
    - name: pre-prod
      path: env/pre-prod
      update:
        strategy: kustomize
      approval: pr-review
      health:
        type: argocd   # Application name defaults to rollouts-demo-pre-prod in namespace argocd

    # Prod EU: PR approval, Argo Rollouts canary, parallel with prod-us
    - name: prod-eu
      dependsOn: [pre-prod]
      path: env/prod-eu
      shard: eu-cluster                   # handled by the agent in the EU cluster
      update:
        strategy: kustomize
      approval: pr-review
      health:
        type: argoRollouts
        argoRollouts:
          name: rollouts-demo
          namespace: rollouts-demo
        timeout: 30m
      delivery:
        delegate: argoRollouts

    # Prod US: PR approval, Argo Rollouts canary, parallel with prod-eu
    - name: prod-us
      dependsOn: [pre-prod]
      path: env/prod-us
      shard: us-cluster                   # handled by the agent in the US cluster
      update:
        strategy: kustomize
      approval: pr-review
      health:
        type: argoRollouts
        argoRollouts:
          name: rollouts-demo
          namespace: rollouts-demo
        timeout: 30m
      delivery:
        delegate: argoRollouts

  historyLimit: 20
