# Org-level PolicyGates
# These are applied to the platform-policies namespace and automatically
# injected into every Pipeline that targets prod environments.
---
apiVersion: kardinal.io/v1alpha1
kind: PolicyGate
metadata:
  name: no-weekend-deploys
  namespace: platform-policies
  labels:
    kardinal.io/scope: org
    kardinal.io/applies-to: prod
    kardinal.io/type: gate
spec:
  expression: "!schedule.isWeekend"
  message: "Production deployments are blocked on weekends"
  recheckInterval: 5m
---
apiVersion: kardinal.io/v1alpha1
kind: PolicyGate
metadata:
  name: require-uat-soak
  namespace: platform-policies
  labels:
    kardinal.io/scope: org
    kardinal.io/applies-to: prod
    kardinal.io/type: gate
spec:
  expression: "bundle.upstreamSoakMinutes >= 30"
  message: "Bundle must be verified in uat for at least 30 minutes before promoting to prod"
  recheckInterval: 1m
